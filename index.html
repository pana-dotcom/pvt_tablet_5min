<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PVT 反応時間テスト</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
#box {
    width: 300px;
    height: 200px;
    background: gray;
    margin: auto;
    line-height: 200px;
    font-size: 24px;
    color: white;
    cursor: pointer;
}
button{
    margin-top:20px;
    font-size:18px;
    padding:10px 20px;
}
</style>
</head>
<body>

<h1>PVT（反応時間テスト）</h1>
<p>赤になったらすぐクリック！</p>

<button id="startBtn">テスト開始</button>

<div id="box">待機中...</div>

<p id="result"></p>

<script>
let testDuration = 180000;  // 3分
let testStartTime;

let startTime;
let waiting = false;
let isRunning = false;   // ← テスト中かどうか

let results = [];

const box = document.getElementById("box");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");

// ✅ スタートボタン
startBtn.addEventListener("click", () => {
    results = [];             // リセット
    isRunning = true;
    testStartTime = Date.now(); // ← ここで初めて時間開始
    startBtn.disabled = true; // ボタン無効化
    startTest();
});

function startTest(){

    box.style.background = "gray";
    box.textContent = "待機中...";
    waiting = true;

    let delay = Math.random() * 8000 + 2000; // 2〜10秒

    setTimeout(() => {
        if (!isRunning) return;  // 終了後の誤動作防止

        box.style.background = "red";
        box.textContent = "クリック！";
        startTime = Date.now();
        waiting = false;
    }, delay);
}

box.addEventListener("click", () => {

    if (!isRunning) return; // ← 未開始時は無視

    if (waiting) {
        result.textContent = "早すぎ！（フライング）";
        return;
    } else {
        let endTime = Date.now();
        let reaction = endTime - startTime;

        results.push(reaction);

        let avg = results.reduce((a, b) => a + b) / results.length;

        // 残り時間
        let remaining = Math.ceil((testDuration - (Date.now() - testStartTime)) / 1000);

        result.textContent =
          "反応: " + reaction +
          " ms / 平均: " + avg.toFixed(1) +
          " ms / 残り: " + remaining + "秒";

        // ✅ 3分終了
        if (Date.now() - testStartTime >= testDuration) {

            let lapseCount = results.filter(t => t > 500).length;

            alert(
              "テスト終了\n" +
              "試行数: " + results.length + "\n" +
              "平均: " + avg.toFixed(1) + " ms\n" +
              "ラプス: " + lapseCount + "回"
            );

            downloadCSV();

            isRunning = false;
            startBtn.disabled = false;

            return;
        }

        startTest();
    }
});

function downloadCSV() {
    let csv = "trial,reaction_time_ms\n";

    results.forEach((time, index) => {
        csv += (index + 1) + "," + time + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "pvt_result.csv";

    link.click();
}
</script>

</body>
</html>
