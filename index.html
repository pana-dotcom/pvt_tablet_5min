<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PVT 反応時間テスト</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
#box {
    width: 300px;
    height: 200px;
    background: gray;
    margin: auto;
    line-height: 200px;
    font-size: 24px;
    color: white;
    cursor: pointer;
}
button{
    margin-top:20px;
    font-size:18px;
    padding:10px 20px;
}
</style>
</head>
<body>

<h1>PVT（反応時間テスト）</h1>
<p>赤になったらすぐクリック！</p>

<button id="startBtn">テスト開始</button>

<div id="box">待機中...</div>

<p id="result"></p>

<script>
//let testDuration = 180000;  // 3分
let testDuration = 3000;  // 30秒
let testStartTime;

let startTime;
let waiting = false;
let isRunning = false;

let results = [];

const box = document.getElementById("box");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");

// スタート
startBtn.addEventListener("click", () => {
    results = [];
    isRunning = true;
    testStartTime = Date.now();
    startBtn.disabled = true;
    startTest();
});

function startTest(){
    box.style.background = "gray";
    box.textContent = "待機中...";
    waiting = true;

    let delay = Math.random() * 8000 + 2000;

    setTimeout(() => {
        if (!isRunning) return;

        box.style.background = "red";
        box.textContent = "クリック！";
        startTime = Date.now();
        waiting = false;
    }, delay);
}

box.addEventListener("click", () => {

    if (!isRunning) return;

    if (waiting) {
        return; // フライング無視
    } else {
        let endTime = Date.now();
        let reaction = endTime - startTime;

        results.push(reaction);

        // 表示は何もしない（完全非表示）

        if (Date.now() - testStartTime >= testDuration) {

            alert("テスト終了");

            downloadCSV();

            isRunning = false;
            startBtn.disabled = false;

            return;
        }

        startTest();
    }
});

// 日付＋時間のファイル名
function downloadCSV() {

    let now = new Date();

    let fileName =
        now.getFullYear() +
        (now.getMonth()+1).toString().padStart(2,"0") +
        now.getDate().toString().padStart(2,"0") + "_" +
        now.getHours().toString().padStart(2,"0") +
        now.getMinutes().toString().padStart(2,"0");

    let csv = "trial,reaction_time_ms\n";

    results.forEach((time, index) => {
        csv += (index + 1) + "," + time + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "pvt_" + fileName + ".csv";

    link.click();
}
</script>

</body>
</html>
