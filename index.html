<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PVT 反応時間テスト</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
#box {
    width: 300px;
    height: 200px;
    background: gray;
    margin: auto;
    line-height: 200px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
#box.waiting {
    font-size: 80px;
}
button{
    margin-top:20px;
    font-size:18px;
    padding:10px 20px;
}
.instruction {
    font-size: 40px;
    font-weight: bold;
}
</style>
</head>

<body>

<p class="instruction">赤になったらすぐタップ！</p>

<button id="startBtn">テスト開始</button>

<div id="box" class="waiting">✖</div>

<script>
let testDuration = 270000; // 4分30秒
let testStartTime;

let startTime;
let waiting = false;
let isRunning = false;

let results = [];

// ✅ 強制終了タイマー
let forceEndTimer;

const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");

// ✅ スタート
startBtn.addEventListener("click", () => {
    results = [];
    isRunning = true;
    testStartTime = Date.now();
    startBtn.disabled = true;

    // ✅ フルスクリーンは削除済み

    // ✅ 強制終了
    forceEndTimer = setTimeout(() => {
        if (isRunning) {
            endTest();
        }
    }, testDuration);

    startTest();
});

function startTest(){
    if (!isRunning) return;

    box.style.background = "gray";
    box.classList.add("waiting");
    box.textContent = "✖";
    waiting = true;

    let delay = Math.random() * 8000 + 2000;

    setTimeout(() => {
        if (!isRunning) return;

        requestAnimationFrame(() => {
            if (!isRunning) return;

            box.style.background = "red";
            box.classList.remove("waiting");
            box.textContent = "タップ！";
            startTime = performance.now();
            waiting = false;
        });
    }, delay);
}

// ✅ 共通処理
function handleResponse() {
    if (!isRunning) return;

    if (waiting) {
        return; // フライング無視
    }

    let endTime = performance.now();
    let reaction = Math.round(endTime - startTime);

    results.push(reaction);

    startTest();
}

// ✅ タップ処理
box.addEventListener("touchstart", handleResponse);
box.addEventListener("click", handleResponse);

// ✅ 終了
function endTest() {
    if (!isRunning) return;

    isRunning = false;

    // ✅ タイマー解除
    clearTimeout(forceEndTimer);

    startBtn.disabled = false;

    box.style.background = "black";
    box.textContent = "終了";

    downloadCSV();
}

// ✅ CSV出力
function downloadCSV() {
    let now = new Date();

    let fileName =
        now.getFullYear() +
        (now.getMonth()+1).toString().padStart(2,"0") +
        now.getDate().toString().padStart(2,"0") + "_" +
        now.getHours().toString().padStart(2,"0") +
        now.getMinutes().toString().padStart(2,"0");

    let csv = "trial,reaction_time_ms,lapse\n";

    results.forEach((time, index) => {
        let lapse = (time >= 500) ? 1 : 0;
        csv += (index + 1) + "," + time + "," + lapse + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "pvt_" + fileName + ".csv";

    link.click();
}
</script>

</body>
</html>
