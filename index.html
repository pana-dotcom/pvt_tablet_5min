<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PVT 反応時間テスト</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
#box {
    width: 300px;
    height: 200px;
    background: gray;
    margin: auto;
    line-height: 200px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

#box.waiting {
    font-size: 80px;
}

button{
    margin-top:20px;
    font-size:18px;
    padding:10px 20px;
}


.instruction {
    font-size: 40px;
    font-weight: bold;
}

</style>
</head>
<body>

<p class="instruction">赤になったらすぐタップ！</p>

<button id="startBtn">テスト開始</button>

<div id="box" class="waiting">✖</div>

<script>
let testDuration = 300000;
let testStartTime;

let startTime;
let waiting = false;
let isRunning = false;

let timeoutId = null;
let results = [];

const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");

// スタート
startBtn.addEventListener("click", () => {
    results = [];
    isRunning = true;
    testStartTime = Date.now();
    startBtn.disabled = true;

    // フルスクリーン（任意）
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }

    startTest();
});

function startTest(){
    box.style.background = "gray";
    box.classList.add("waiting");
    box.textContent = "✖";
    waiting = true;

    // ✅ 2〜10秒ランダム
    let delay = Math.random() * 8000 + 2000;

    setTimeout(() => {
        if (!isRunning) return;

        // ✅ 描画と計測を同期
        requestAnimationFrame(() => {
            box.style.background = "red";
            box.classList.remove("waiting");
            box.textContent = "タップ！";
            startTime = performance.now();
            waiting = false;
        });


    }, delay);
}

// ✅ 共通処理（タップ＆クリック）
function handleResponse() {
    if (!isRunning) return;

    if (waiting) {
        return; // フライング無視
    }

    let endTime = performance.now();
    let reaction = Math.round(endTime - startTime);

    results.push(reaction);

    if (Date.now() - testStartTime >= testDuration) {
        endTest();
        return;
    }

    startTest();
}

// ✅ スマホ高速入力
box.addEventListener("touchstart", handleResponse);
box.addEventListener("click", handleResponse);

// ✅ テスト終了
function endTest() {
    isRunning = false;
    startBtn.disabled = false;
    downloadCSV();
}


// ✅ CSV出力
function downloadCSV() {
    let now = new Date();

    let fileName =
        now.getFullYear() +
        (now.getMonth()+1).toString().padStart(2,"0") +
        now.getDate().toString().padStart(2,"0") + "_" +
        now.getHours().toString().padStart(2,"0") +
        now.getMinutes().toString().padStart(2,"0");

    // ✅ 3列
    let csv = "trial,reaction_time_ms,lapse\n";

    results.forEach((time, index) => {
        let lapse = 0;

        // ✅ 500ms以上ならラプス
        if (time >= 500) {
            lapse = 1;
        }

        csv += (index + 1) + "," + time + "," + lapse + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "pvt_" + fileName + ".csv";

    link.click();
}
</script>

</body>
</html>
